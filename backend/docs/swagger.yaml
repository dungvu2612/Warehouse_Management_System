info:
  contact: {}
  description: |-
    Tài liệu API cho hệ thống quản lý kho WMS.
    Hệ thống hỗ trợ quản lý sản phẩm, tồn kho, đơn hàng, nhập kho, picking, khay/kệ, người dùng và lịch sử kho.
  title: WMS Warehouse Management API
  version: "1.0"
paths:
  /admin/import-receipt-items/{item_id}/assign:
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID dòng phiếu nhập
        in: path
        name: item_id
        required: true
        type: integer
      - description: Nhân viên được gán
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocAssignImportReceiptItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: ADMIN gán task nhập kho
      tags:
      - Import Receipts
  /admin/import-receipt-items/{item_id}/unassign:
    patch:
      parameters:
      - description: ID dòng phiếu nhập
        in: path
        name: item_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: ADMIN gỡ phân công task nhập kho
      tags:
      - Import Receipts
  /admin/picking/orders/{order_id}/assign:
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID đơn hàng
        in: path
        name: order_id
        required: true
        type: integer
      - description: Nhân viên được gán
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocAssignPickingOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: ADMIN gán đơn picking cho nhân viên
      tags:
      - Admin Picking
  /admin/picking/orders/{order_id}/unassign:
    patch:
      description: Chỉ gỡ nếu chưa phát sinh dữ liệu picking theo rule backend.
      parameters:
      - description: ID đơn hàng
        in: path
        name: order_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: ADMIN gỡ phân công đơn picking
      tags:
      - Admin Picking
  /audit/consistency/{order_id}:
    get:
      description: Kiểm tra sai lệch order/picking/stock cho một đơn hàng.
      parameters:
      - description: ID đơn hàng
        in: path
        name: order_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocAuditConsistency'
      security:
      - BearerAuth: []
      summary: Kiểm tra nhất quán đơn hàng
      tags:
      - Audit
  /auth/login:
    post:
      consumes:
      - application/json
      description: Đăng nhập bằng username/password và nhận JWT token.
      parameters:
      - description: Thông tin đăng nhập
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocLoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.DocErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.DocErrorResponse'
      summary: Đăng nhập
      tags:
      - Auth
  /dashboard/stats:
    get:
      description: Thống kê dashboard theo role hiện tại.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocDashboardStats'
      security:
      - BearerAuth: []
      summary: Dashboard thống kê
      tags:
      - Dashboard
  /health:
    get:
      description: Public health check cho backend.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      summary: Kiểm tra trạng thái server
      tags:
      - Health
  /import-receipts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.DocImportReceipt'
            type: array
      security:
      - BearerAuth: []
      summary: Danh sách phiếu nhập
      tags:
      - Import Receipts
    post:
      consumes:
      - application/json
      description: ADMIN tạo phiếu nhập kế hoạch; các dòng item trở thành công việc
        nhập kho cho STAFF.
      parameters:
      - description: Thông tin phiếu nhập
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocCreateImportReceiptRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: Tạo phiếu nhập
      tags:
      - Import Receipts
  /import-receipts/{id}:
    get:
      parameters:
      - description: ID phiếu nhập
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocImportReceipt'
      security:
      - BearerAuth: []
      summary: Chi tiết phiếu nhập
      tags:
      - Import Receipts
  /inventory:
    get:
      description: Xem tồn kho theo sản phẩm/khay.
      parameters:
      - description: ID sản phẩm
        in: query
        name: product_id
        type: integer
      - description: ID khay
        in: query
        name: tray_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.DocInventory'
            type: array
      security:
      - BearerAuth: []
      summary: Danh sách tồn kho
      tags:
      - Inventory
    post:
      consumes:
      - application/json
      parameters:
      - description: Thông tin tồn kho
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocCreateInventoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.DocInventory'
      security:
      - BearerAuth: []
      summary: Tạo tồn kho ban đầu
      tags:
      - Inventory
  /inventory/{id}/adjust:
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID tồn kho
        in: path
        name: id
        required: true
        type: integer
      - description: Thông tin điều chỉnh
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocAdjustInventoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: Điều chỉnh tồn kho
      tags:
      - Inventory
  /inventory/adjust-by-tray:
    post:
      consumes:
      - application/json
      parameters:
      - description: Thông tin điều chỉnh theo khay
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocAdjustByTrayRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: Điều chỉnh tồn bằng QR khay
      tags:
      - Inventory
  /inventory/putaway:
    post:
      consumes:
      - application/json
      description: Nhập kho theo QR sản phẩm và QR khay, cộng tồn và ghi stock transaction
        IMPORT.
      parameters:
      - description: Thông tin nhập kho
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.DocPutawayRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: Nhập kho nhanh bằng QR
      tags:
      - Inventory
  /inventory/putaway-requests:
    get:
      parameters:
      - description: Trạng thái yêu cầu
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items: {}
            type: array
      security:
      - BearerAuth: []
      summary: Danh sách yêu cầu putaway legacy
      tags:
      - Inventory
  /inventory/putaway-requests/{id}/approve:
    post:
      parameters:
      - description: ID yêu cầu
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DocSuccessResponse'
      security:
      - BearerAuth: []
      summary: Duyệt yêu cầu putaway legacy
      tags:
